<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEDUSA Advertising</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a1a3c;
    color: white;
}

/* HEADER */
.header {
    text-align: center;
    padding: 30px;
    font-size: 32px;
    font-weight: bold;
    background: linear-gradient(45deg, navy, #001f5c);
    color: yellow;
    letter-spacing: 2px;
}

/* CONTAINER */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 30px;
}

/* CARD */
.card {
    background: #112b5c;
    padding: 25px;
    border-radius: 15px;
    text-align: center;
    transition: 0.3s;
    border: 2px solid yellow;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px yellow;
}

/* BUTTON */
.btn {
    display: inline-block;
    margin-top: 15px;
    padding: 12px 20px;
    background: yellow;
    color: black;
    text-decoration: none;
    border-radius: 25px;
    font-weight: bold;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 20px;
}

/* SOCIAL ICONS */
.social img {
    width: 40px;
    margin: 10px;
    transition: 0.3s;
}

.social img:hover {
    transform: scale(1.2);
}
</style>
</head>

<body>

<div class="header">MEDUSA Advertising</div>

<div class="container">

    <!-- 1 T SHIRT -->

        <h2>Customize T Shirt</h2>

    </div>

    <!-- 2 BANNER -->

    </div>

    <!-- 3 STICKER -->
    <div class="card">
        <h2>Sticker Design & Printing</h2>
        <a class="btn" href="https://wa.me/94772353582?text=I%20need%20Sticker%20Design%20%26%20Printing">Order Now</a>
    </div>

    <!-- 4 FB POST -->
    <div class="card">
        <h2>Facebook Post Design</h2>
        <a class="btn" href="https://wa.me/94772353582?text=I%20need%20Facebook%20Post%20Design">Order Now</a>
    </div>

    <!-- 5 YOUTUBE -->
    <div class="card">
        <h2>YouTube Thumbnail Design</h2>
        <a class="btn" href="https://wa.me/94772353582?text=I%20need%20YouTube%20Thumbnail%20Design">Order Now</a>

</div>

<div class="footer">
